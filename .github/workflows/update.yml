name: Update Missile Research Library

on:
  schedule:
    # Run at 2 AM UTC every day (you can adjust this time)
    - cron: '0 2 * * *'
  # Allow manual trigger from GitHub
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-research:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Fetch papers from arXiv
        run: |
          python fetch_papers.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Fetch latest papers $(date +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: update-research
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
